
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NGINX OK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial}
    .wrap{min-height:100%;display:grid;place-items:center;background:#0b1e2a;color:#d7e3ec}
    .card{text-align:center;padding:32px 40px;border-radius:16px;background:#112b3a;box-shadow:0 8px 30px rgba(0,0,0,.25)}
    .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#29d981;vertical-align:middle;margin-right:8px}
    h1{margin:.2em 0 0;font-size:28px}
    p{margin:.5em 0 0;opacity:.85}
    small{opacity:.7}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div><span class="dot"></span><strong>NGINX is running</strong></div>
      <h1>It works 🎉</h1>
      <p>Served this static page successfully.</p>
      <small id="ts"></small>
    </div>
  </div>

  <script>
    document.getElementById('ts').textContent = 'Timestamp: ' + new Date().toString();
  </script>
</body>
</html>
